name: Bootstrap Gradle wrapper and Room schemas

on:
  push:
    branches: [codex/protein-ci-room-fix]

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Generate wrapper and current Room schemas
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f gradlew ]]; then
            gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          fi
          chmod +x gradlew
          ./gradlew --no-daemon clean kspDebugKotlin kspReleaseKotlin --stacktrace --console=plain
      - name: Validate generated schemas
        shell: bash
        run: |
          set -euo pipefail
          test -d app/schemas
          if find app/schemas -type f -name '*.json' -empty | grep -q .; then
            echo 'Empty Room schema file detected:'
            find app/schemas -type f -name '*.json' -empty
            exit 1
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path
          files = sorted(Path('app/schemas').rglob('*.json'))
          if not files:
              raise SystemExit('No Room schema JSON files were generated')
          for path in files:
              with path.open(encoding='utf-8') as handle:
                  json.load(handle)
              print(f'validated {path}')
          PY
      - name: Commit generated wrapper and schemas
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add gradlew gradlew.bat gradle/wrapper app/schemas
          if git diff --cached --quiet; then
            echo 'Wrapper and schemas already committed.'
            exit 0
          fi
          git commit -m 'Generate Gradle wrapper and Room schemas'
          git push
