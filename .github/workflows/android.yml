name: Android CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Run Gradle tests
        id: gradle-tests
        shell: bash
        run: |
          set +e
          gradle test --console=plain > gradle-test.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "GRADLE_TEST_FAILURE"
            grep -E "(^e: |error:|FAILURE:|What went wrong:|FAILED|Unresolved reference|Compilation error|Could not resolve)" gradle-test.log | tail -n 200 || true
            exit "$status"
          fi
          echo "Gradle tests passed"
      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-log
          path: gradle-test.log
          retention-days: 3
