name: Commit Room v6 schema

on:
  push:
    branches: [codex/protein-ci-room-fix]

permissions:
  contents: write

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Generate and validate Room schema 6
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon clean kspDebugKotlin kspReleaseKotlin --stacktrace --console=plain
          schema='app/schemas/com.sam.caloriestreak.data.local.database.CalorieStreakDatabase/6.json'
          test -s "$schema"
          python3 -m json.tool "$schema" >/dev/null
      - name: Commit generated schema
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/schemas/com.sam.caloriestreak.data.local.database.CalorieStreakDatabase/6.json
          if git diff --cached --quiet; then
            echo 'Schema 6 already committed.'
            exit 0
          fi
          git commit -m 'Commit generated Room schema 6'
          git push
